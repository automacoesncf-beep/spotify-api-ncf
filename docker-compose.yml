services:
  api:
    build:
      context: ./server
    ports:
      - "3001:3001"

    env_file:
      - .env

    environment:
      PORT: "3001"
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:3001/auth/callback}

      SCHEDULE_PATH: /app/schedule.json
      TOKENS_PATH: /app/tokens.json
      STATE_PATH: /app/playback_state.json

      TZ: America/Sao_Paulo
      SCHEDULE_TZ: America/Sao_Paulo
      CORS_ORIGIN: http://localhost:5173

      FETCH_TIMEOUT_MS: "20000"
      PLAYER_PROBE_TIMEOUT_MS: "8000"
      PLAYER_ROUTE_TIMEOUT_MS: "12000"
      PLAYER_CACHE_TTL_MS: "60000"
      PLAYER_STALE_TTL_MS: "180000"

    volumes:
      - ./server/schedule.json:/app/schedule.json
      - ./server/tokens.json:/app/tokens.json
      - ./server/playback_state.json:/app/playback_state.json

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped